<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* .one{
            width: 300px;
            height: 300px;
            background-color: red;
            animation-name: ani;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in;
            animation-delay: 5s;
        }
        @keyframes ani{
            from{
                transform: translate(0, 0); 
            }
            to{
                transform: translateX(200px);
                background-color:fuchsia;
                border: 100px solid rgba(21, 64, 235, 0.88);
                border-radius: 100%;
            }
        }  */
          body{
            background-color:steelblue;

          }
          .container{
            height: 80vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
          }
          .loader{
            height: 80px;
            width: 200px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
          }
          .dot{
            background-color: rgb(0, 255, 255);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin: 20px;
         
            /* animation: bounce 1s infinite; */
          }
          .dot:nth-child(1){
            animation: animateloader1 2s infinite;
            animation-delay: 0s;
          }
          .dot:nth-child(2){
            animation: animateloader1 1.8s infinite;
            animation-delay: 0s;
          }
          .dot:nth-child(3){
            animation: animateloader1 1.7s infinite;
            animation-delay: 0s;
          }
          .dot:nth-child(4){
            animation: animateloader1 1.6s infinite;
            animation-delay: 0s;
          }
          .dot:nth-child(5){
            animation: animateloader1 1.5s infinite;
            animation-delay: 0s;
          }
          .dot:nth-child(6){
            animation: animateloader1 1.4s infinite;
            animation-delay: 0s;
          }
          .dot:nth-child(7){
            animation: animateloader1 1.3s infinite;
            animation-delay: 0s;
          }
          .dot:nth-child(8){
            animation: animateloader1 1.2s infinite;
            animation-delay: 0s;
          }
          .dot:nth-child(9){
            animation: animateloader1 1.1s infinite;
            animation-delay: 0s;
          }
          @keyframes animateloader1{
           /*  0%{
                transform: translateY(0);
                background-color: rgb(0, 255, 55);
            }
            50%{
                transform: translateY(-30px);
                background-color: rgb(255, 0, 255);
            }
            100%{
                transform: translateY(0);
                background-color: rgb(0, 255, 255);
            } 
          }*/
             0%{
                transform: scale(1);
             }
             50%{
                transform: scale3d(1.5, 1.5, 1.5);
                opacity: 1;
            }
             100%{
                transform: scale(1);
                opacity: 0.5;
             }
            
          } 
         .loader2 {
    display: flex; /* Add this line */
    margin: 20px;
    justify-content: center;
    flex-wrap: wrap;
}

.line {
    background-color: rgb(0, 255, 255);
    width: 5px;
    height: 100px;
    margin: 0 5px;
}

/* Each line animates with a different delay for flicker effect */
.line:nth-child(1) {
    animation: animateloader2 1.3s infinite;
}
.line:nth-child(2) {
    animation: animateloader2 1.4s infinite;
}
.line:nth-child(3) {
    animation: animateloader2 1.6s infinite;
}
.line:nth-child(4) {
    animation: animateloader2 1.4s infinite;
}
.line:nth-child(5) {
    animation: animateloader2 1.2s infinite;
}

@keyframes animateloader2 {
    0% {
        transform: scale(1);
        background-color: rgb(0, 255, 55);
        opacity: 0.8;
    }
    50% {
        transform: scale(1.5);
        background-color: rgb(255, 0, 255);
        opacity: 1;
    }
    100% {
        transform: scale(1);
        background-color: rgb(0, 255, 255);
        opacity: 0.5;
    }
}

</style>
</head>
<body>
    <!-- <div class="one"></div> -->
    <div class="container">
        <div class="loader">
            <div class="dot"></div>            
            <div class="dot"></div>            
            <div class="dot"></div>            
            <div class="dot"></div>            
            <div class="dot"></div>            
            <div class="dot"></div>            
            <div class="dot"></div>            
            <div class="dot"></div>            
            <div class="dot"></div>            
        </div>
        <div class="loader2"></div>
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
          <div class="line"></div>
        </div>
    </div>
</body>
</html>
