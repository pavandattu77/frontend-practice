<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box</title>
    <style>
        .container{
            color: rgb(239, 5, 184);
            background-color: aqua;
            width: 500px;
            height: 1600px;
             border: 5px rgb(227, 251, 10) solid;
        }
        .box1{
            color: blue;
            width: 100px;
            height: 100px;
            border: 5px rgb(227, 251, 10) solid;
            border-radius: 10px;
            border-color: coral;
            margin: 10px 170px;
            padding: 25px;
        }
         .box2{
            color: rgb(9, 230, 200);
            background-color: crimson;
            width: 100px;
            height: 100px;
            border: 5px rgb(227, 251, 10) solid;
            border-radius: 10px;
            border-color: coral;
            margin: 170px;
            padding: 25px;
        }
         .box3{
            color: rgb(12, 222, 68);
            background-color: black;
            width: 100px;
            height: 200px;
            border: 5px rgb(227, 251, 10) solid;
            border-radius: 10px;
            border-color: coral;
            margin: 10px 170px;
            padding: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">one</div>
        <div class="box2">two</div>
        <div class="box3">three</div>
    </div>
</body>
</html>
