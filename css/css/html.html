<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            font-size: small;
            font-style: initial;
            color: palevioletred;
        }
        p.pa{
            font-style: italic;
            font-size: medium;
            color: aquamarine;
        }
        p#para{
            font-size: larger;
            font-style: oblique;
            color: aqua;
        }
    </style>
</head>
<body>
    <p>sdkfjbgeruibg</p>
    <p class="pa">sgferg</p>
    <p id="para"></p>
</body>
</html>
