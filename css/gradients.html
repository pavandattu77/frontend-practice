<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>using background</title>
    <style>
        .one{
            height: 100px;
            width: 100px;
            background: linear-gradient(to right top,red,blue,violet,green,yellow);
        }
        .two{
            height: 100px;
            width: 100px;
            background: repeating-linear-gradient(-45deg,red 10%,blue 20%,violet 10%,green 20%,yellow 50%);
        }
        .three{
            height: 100px;
            width: 100px;
            background: radial-gradient(red,blue,violet ,green ,yellow );
        }
    </style>
</head>
<body>
    <div class="one"></div>
    <div class="two"></div>
    <div class="three"></div>
</body>
</html>
