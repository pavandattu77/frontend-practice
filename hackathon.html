<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #d2f0d2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .quiz-container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    #timer {
      font-size: 18px;
      margin-bottom: 20px;
      color: darkgreen;
      font-weight: bold;
    }

    #question {
      font-size: 20px;
      margin-bottom: 20px;
    }

    .options label {
      display: block;
      margin: 10px 0;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .options input[type="radio"] {
      display: none;
    }

    .options input[type="radio"]:checked + span {
      background: #007bff;
      color: white;
      padding: 10px;
      display: inline-block;
      border-radius: 5px;
    }

    #nextBtn {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #nextBtn:hover {
      background-color: #0056b3;
    }

    #result {
      font-size: 22px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="quiz-container">
    <div id="timer">Time left: <span id="time">60</span> seconds</div>
    <div id="question">Loading...</div>
    <form id="options" class="options"></form>
    <button id="nextBtn" disabled>Next</button>
    <div id="result" style="margin-top: 20px;"></div>
  </div>

  <script>
    const questions = [
      {
        question: "What is the full form of HTML?",
        options: ["Hyper Text Markup Language", "High Text Machine Language", "Hyper Tool Markup Language", "None of the above"],
        answer: 0
      },
      {
        question: "What does CSS stand for?",
        options: ["Creative Style Sheets", "Cascading Style Sheets", "Colorful Style Sheets", "Computer Style Syntax"],
        answer: 1
      },
      {
        question: "What is the use of JavaScript?",
        options: ["Styling", "Markup", "Functionality and logic", "Database"],
        answer: 2
      },
      {
        question: "Which tag is used to link CSS?",
        options: ["<script>", "<css>", "<link>", "<style>"],
        answer: 2
      },
      {
        question: "Which CSS type is written inside an HTML element?",
        options: ["Inline", "Internal", "External", "None"],
        answer: 0
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let timer;
    let timeLeft = 10;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const nextBtn = document.getElementById("nextBtn");
    const timerEl = document.getElementById("time");
    const resultEl = document.getElementById("result");

    function Question() {
      clearInterval(timer);
      timeLeft = 60;
      timerEl.textContent = timeLeft;
      timer = setInterval(updateTimer, 1000);

      const q = questions[currentQuestion];
      questionEl.textContent = `${currentQuestion + 1}. ${q.question}`;
      optionsEl.innerHTML = "";
      nextBtn.disabled = true;

      q.options.forEach((opt, idx) => {
        const label = document.createElement("label");
        const input = document.createElement("input");
        input.type = "radio";
        input.name = "option";
        input.value = idx;

        const span = document.createElement("span");
        span.textContent = opt;

        input.addEventListener("change", () => {
          nextBtn.disabled = false;
        });

        label.appendChild(input);
        label.appendChild(span);
        optionsEl.appendChild(label);
      });
    }

    function updateTimer() {
      timeLeft--;
      timerEl.textContent = timeLeft;
      if (timeLeft === 0) {
        clearInterval(timer);
        handleNextQuestion(null); // No answer selected
      }
    }

    function handleNextQuestion(userAnswer) {
      clearInterval(timer);

      const selected = document.querySelector('input[name="option"]:checked');
      const answerIndex = questions[currentQuestion].answer;
      if (selected && parseInt(selected.value) === answerIndex) {
        score++;
      }

      currentQuestion++;
      if (currentQuestion < questions.length) {
        Question();
      } else {
        showResult();
      }
    }

    function showResult() {
  questionEl.style.display = "none";
  optionsEl.style.display = "none";
  nextBtn.style.display = "none";
  document.getElementById("timer").style.display = "none";

  const percentage = Math.round((score / questions.length) * 100);
  let stars = "";

  if (percentage >= 90) stars = "★★★★★";
  else if (percentage >= 75) stars = "★★★★☆";
  else if (percentage >= 60) stars = "★★★☆☆";
  else if (percentage >= 40) stars = "★★☆☆☆";
  else if (percentage >= 20) stars = "★☆☆☆☆";
  else stars = "☆☆☆☆☆";

  resultEl.innerHTML = `
    <p>🎯 Quiz Completed!</p>
    <p>✅ Score: <strong>${score}</strong> out of ${questions.length}</p>
    <p>📊 Percentage: <strong>${percentage}%</strong></p>
    <p>⭐ Rating: <span style="font-size: 1.5rem; color: orange;">${stars}</span></p>
  `;
}


    nextBtn.addEventListener("click", () => {
      handleNextQuestion();
    });
    Question();
  </script>

</body>
</html>
