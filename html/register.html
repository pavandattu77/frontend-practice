<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body {
    background: greenyellow;
   
    margin: 0;
    padding: 0;
}

table {
    background-color: #ffffff;
    border-collapse: collapse;
    width: 400px;
    padding: 20px;
    border-radius: 12px;

    border: none;
}

td {

}


#sub {
    background-color: #007bff;
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 16px;
    border-radius: 6px;
}

#sub:hover {

}

    </style>
</head>
<body>
    <form>
        <center>
        <table border="5">
            <tr>
                <td>
    <center><h1>Registration form</h1></center>
    <label for="Name">Name : </label><input type="text" placeholder="Enter your Name ">

        <p>Password : <input type="password" placeholder="Enter password"></p>

            <option value="">Hyderabad</option>
            <option value="">Chennai</option>
            <option value="">Bangalore</option>
            <option value="">Ooty</option>
        </select></p>
        Languages Known :

            <input type="checkbox">Spanish
            <input type="checkbox">Japanese

            <input type="checkbox">French
        </p>   
        <p><input id="sub" type="submit" value="Register"></p>
    </td>
    </tr>
</table>
        </center>
    </form>
